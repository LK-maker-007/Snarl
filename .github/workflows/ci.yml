name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  ml-quality:
    name: ML lint / types / tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ml
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: '3.12'
      # Install the CPU-only torch build first so the editable install below resolves the heavy
      # convert deps (torch/litert) without pulling the multi-GB CUDA wheel. The package genuinely
      # depends on torch, so CI installs it and type-checks/tests the model, export, parity and
      # verify paths for real rather than skipping them.
      - run: pip install --upgrade pip
      - run: pip install 'torch>=2.4' --index-url https://download.pytorch.org/whl/cpu
      - run: pip install -e '.[dev,convert]'
      - run: ruff check src tests
      - run: mypy
      - run: pytest -q

  # Lightweight, dependency-free secret scan. (The gitleaks GitHub Action now requires a paid
  # GITLEAKS_LICENSE and fails when its account check is rate-limited, so we scan tracked files
  # directly. Swap in gitleaks/trufflehog later if a fuller scan is wanted.)
  secret-scan:
    name: Secret scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - name: Scan tracked files for secrets
        run: |
          pattern='AKIA[0-9A-Z]{16}|-----BEGIN [A-Z ]*PRIVATE KEY-----|xox[baprs]-[0-9A-Za-z-]{8,}'
          if git grep -InE "$pattern" -- . ; then
            echo "::error::potential secret found"; exit 1
          fi
          if git ls-files | grep -E '\.(pem|p12|pfx|key|keystore)$' | grep -vx 'app/android/app/debug.keystore' ; then
            echo "::error::secret-like file is tracked"; exit 1
          fi
          echo "no obvious secrets"

  app-quality:
    name: App lint / types / tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: app
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: app/package-lock.json
      - run: npm ci
      - run: npm run lint
      - run: npx tsc --noEmit
      - run: npm test
