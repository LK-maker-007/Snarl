name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  ml-quality:
    name: ML lint / types / tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ml
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - run: pip install -e '.[dev]'
      - run: ruff check src tests
      - run: mypy
      - run: pytest -q

  # Lightweight, dependency-free secret scan. (The gitleaks GitHub Action now requires a paid
  # GITLEAKS_LICENSE and fails when its account check is rate-limited, so we scan tracked files
  # directly. Swap in gitleaks/trufflehog later if a fuller scan is wanted.)
  secret-scan:
    name: Secret scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Scan tracked files for secrets
        run: |
          pattern='AKIA[0-9A-Z]{16}|-----BEGIN [A-Z ]*PRIVATE KEY-----|xox[baprs]-[0-9A-Za-z-]{8,}'
          if git grep -InE "$pattern" -- . ; then
            echo "::error::potential secret found"; exit 1
          fi
          if git ls-files | grep -E '\.(pem|p12|pfx|key|keystore)$' | grep -vx 'app/android/app/debug.keystore' ; then
            echo "::error::secret-like file is tracked"; exit 1
          fi
          echo "no obvious secrets"

# The app lint/type/test job is added together with app/package-lock.json (generated by
# `cd app && npm install` on Node 22). Until that lockfile is committed, `npm ci` cannot run,
# so the job is intentionally omitted rather than left failing.
