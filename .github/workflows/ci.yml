name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  ml-quality:
    name: ML lint / types / tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ml
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - run: pip install -e '.[dev]'
      - run: ruff check src tests
      - run: mypy
      - run: pytest -q

  secret-scan:
    name: Secret scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: gitleaks/gitleaks-action@v2

# The app lint/type/test job is added together with app/package-lock.json (generated by
# `cd app && npm install` on Node 22). Until that lockfile is committed, `npm ci` cannot run,
# so the job is intentionally omitted rather than left failing.
